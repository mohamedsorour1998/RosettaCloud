apiVersion: v1
kind: ConfigMap
metadata:
  name: rosettacloud-backend-config
  namespace: dev
data:
  LAB_IMAGE_PULL_SECRET: "ecr-creds"
  LAB_K8S_NAMESPACE: "dev"
  LAB_POD_IMAGE: "339712964409.dkr.ecr.us-east-1.amazonaws.com/interactive-labs:latest"
  AWS_REGION: "us-east-1"
  INGRESS_NAME: "rosettacloud-ingress"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  SQS_QUEUE_URL: "https://sqs.us-east-1.amazonaws.com/339712964409/rosettacloud-feedback-requested"
  CACHE_EVENTS_BACKEND: "redis_sqs"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rosettacloud-backend
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rosettacloud-backend
  template:
    metadata:
      labels:
        app: rosettacloud-backend
    spec:
      serviceAccountName: rosettacloud-backend
      containers:
        - name: rosettacloud-backend
          image: 339712964409.dkr.ecr.us-east-1.amazonaws.com/rosettacloud-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: LAB_IMAGE_PULL_SECRET
              valueFrom:
                configMapKeyRef:
                  name: rosettacloud-backend-config
                  key: LAB_IMAGE_PULL_SECRET
            - name: LAB_K8S_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: rosettacloud-backend-config
                  key: LAB_K8S_NAMESPACE
            - name: LAB_POD_IMAGE
              valueFrom:
                configMapKeyRef:
                  name: rosettacloud-backend-config
                  key: LAB_POD_IMAGE
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: rosettacloud-backend-config
                  key: AWS_REGION
            - name: INGRESS_NAME
              valueFrom:
                configMapKeyRef:
                  name: rosettacloud-backend-config
                  key: INGRESS_NAME
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: rosettacloud-backend-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: rosettacloud-backend-config
                  key: REDIS_PORT
            - name: SQS_QUEUE_URL
              valueFrom:
                configMapKeyRef:
                  name: rosettacloud-backend-config
                  key: SQS_QUEUE_URL
            - name: CACHE_EVENTS_BACKEND
              valueFrom:
                configMapKeyRef:
                  name: rosettacloud-backend-config
                  key: CACHE_EVENTS_BACKEND

---
apiVersion: v1
kind: Service
metadata:
  name: rosettacloud-backend-service
  namespace: dev
spec:
  selector:
    app: rosettacloud-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
