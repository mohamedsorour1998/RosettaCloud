name: Build & push backend image
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker tag
        default: latest
        type: string
      aws_region:
        description: AWS Region
        default: us-east-1
        type: string
  push:
    branches: [main]
    paths:
      - "Backend/app/**"
      - "Backend/Dockerfile"
      - "Backend/requirements.txt"

env:
  AWS_ACCOUNT_ID: "339712964409"
  IAM_ROLE: github-actions-role
  ECR_REPOSITORY: rosettacloud-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.IAM_ROLE }}
          aws-region: ${{ inputs.aws_region || 'us-east-1' }}

      - name: Login to ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ env.AWS_ACCOUNT_ID }}

      - name: Build & push
        run: |
          IMAGE=${{ steps.login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ inputs.image_tag || 'latest' }}
          docker build --platform linux/amd64 -f Backend/Dockerfile Backend -t "$IMAGE"
          docker push "$IMAGE"
          echo "Pushed $IMAGE"

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Rollout restart backend on EKS
        run: |
          aws eks update-kubeconfig --name rosettacloud-eks --region ${{ inputs.aws_region || 'us-east-1' }}
          kubectl rollout restart deployment/rosettacloud-backend -n dev
          kubectl rollout status deployment/rosettacloud-backend -n dev --timeout=120s
