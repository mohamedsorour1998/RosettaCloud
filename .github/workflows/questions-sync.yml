name: Sync questions to S3

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Backend/questions/**"

env:
  AWS_ACCOUNT_ID: "339712964409"
  IAM_ROLE: github-actions-role
  S3_BUCKET: rosettacloud-shared-interactive-labs

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.IAM_ROLE }}
          aws-region: us-east-1

      - name: Sync questions to S3
        run: |
          aws s3 sync Backend/questions/ s3://${{ env.S3_BUCKET }}/ --delete
          echo "Questions synced to s3://${{ env.S3_BUCKET }}/"
