name: Deploy AgentCore Agent

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS Region
        default: us-east-1
        type: string
  push:
    branches: [main]
    paths:
      - "Backend/agents/**"
      - "!Backend/agents/invoke_agent.py"

env:
  AWS_ACCOUNT_ID: "339712964409"
  IAM_ROLE: github-actions-role
  MEMORY_ID: rosettacloud_education_memory-evO1o3F0jN

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: Backend/agents
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.IAM_ROLE }}
          aws-region: ${{ inputs.aws_region || 'us-east-1' }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install agentcore CLI
        run: pip install bedrock-agentcore-starter-toolkit

      - name: Deploy agent
        env:
          GATEWAY_URL: ${{ vars.GATEWAY_URL }}
          COGNITO_TOKEN_URL: ${{ vars.COGNITO_TOKEN_URL }}
          COGNITO_CLIENT_ID: ${{ vars.COGNITO_CLIENT_ID }}
          COGNITO_CLIENT_SECRET: ${{ secrets.COGNITO_CLIENT_SECRET }}
        run: |
          agentcore launch \
            --auto-update-on-conflict \
            --env BEDROCK_AGENTCORE_MEMORY_ID=${{ env.MEMORY_ID }} \
            --env GATEWAY_URL=${{ env.GATEWAY_URL }} \
            --env COGNITO_TOKEN_URL=${{ env.COGNITO_TOKEN_URL }} \
            --env COGNITO_CLIENT_ID=${{ env.COGNITO_CLIENT_ID }} \
            --env COGNITO_CLIENT_SECRET=${{ env.COGNITO_CLIENT_SECRET }}

