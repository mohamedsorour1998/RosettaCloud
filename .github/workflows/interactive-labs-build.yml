name: Build & push interactive-labs image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "DevSecOps/interactive-labs/Dockerfile"
      - "DevSecOps/interactive-labs/**"

env:
  AWS_ACCOUNT_ID: "339712964409"
  IAM_ROLE: github-actions-role
  ECR_REPOSITORY: interactive-labs

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.IAM_ROLE }}
          aws-region: us-east-1

      - name: Login to ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push
        run: |
          REGISTRY=${{ steps.login.outputs.registry }}
          SHA_TAG="${GITHUB_SHA::8}"
          IMAGE_LATEST="$REGISTRY/${{ env.ECR_REPOSITORY }}:latest"
          IMAGE_SHA="$REGISTRY/${{ env.ECR_REPOSITORY }}:$SHA_TAG"
          docker build --platform linux/amd64 \
            -f DevSecOps/interactive-labs/Dockerfile \
            DevSecOps/interactive-labs \
            -t "$IMAGE_LATEST" \
            -t "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"
          docker push "$IMAGE_SHA"
          echo "Pushed $IMAGE_LATEST and $IMAGE_SHA"
          echo "sha_tag=$SHA_TAG" >> "$GITHUB_OUTPUT"
          echo "image_sha=$IMAGE_SHA" >> "$GITHUB_OUTPUT"
        id: build

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Update backend ConfigMap with new image tag
        run: |
          aws eks update-kubeconfig --name rosettacloud-eks --region us-east-1
          kubectl patch configmap rosettacloud-backend-config -n dev \
            --patch "{\"data\":{\"LAB_POD_IMAGE\":\"${{ steps.build.outputs.image_sha }}\"}}"
          echo "ConfigMap LAB_POD_IMAGE updated to ${{ steps.build.outputs.image_sha }}"

      - name: Restart backend to pick up new ConfigMap
        run: |
          kubectl rollout restart deployment/rosettacloud-backend -n dev
          kubectl rollout status deployment/rosettacloud-backend -n dev --timeout=120s
