name: Build & publish Lambda images + create/update Lambda
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker tag
        default: latest
        type: string
      aws_region:
        description: AWS Region
        default: us-east-1
        type: string

env:
  AWS_ACCOUNT_ID: "339712964409"
  IAM_ROLE: github-actions-role

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.IAM_ROLE }}
          aws-region: ${{ inputs.aws_region }}

      - name: Login to ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ env.AWS_ACCOUNT_ID }}

      # ── document_indexer ──────────────────────────────────────────────────
      - name: Build & push document_indexer image
        env:
          REGISTRY: ${{ steps.login.outputs.registry }}
          ECR_REPOSITORY: rosettacloud-document_indexer-lambda
        run: |
          IMAGE_URI=$REGISTRY/$ECR_REPOSITORY:${{ inputs.image_tag }}
          docker build --platform linux/amd64 \
            -f Backend/serverless/Lambda/document_indexer/Dockerfile \
            Backend/serverless/Lambda/document_indexer \
            -t "$IMAGE_URI"
          docker push "$IMAGE_URI"
          echo "document_indexer_image=$IMAGE_URI" >> $GITHUB_ENV
          echo "Pushed $IMAGE_URI"

      - name: Create or update document_indexer Lambda
        run: |
          ROLE="arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/rosettacloud-document-indexer-role"
          IMAGE="${{ env.document_indexer_image }}"
          REGION="${{ inputs.aws_region }}"
          ENV_VARS="Variables={LANCEDB_S3_URI=s3://rosettacloud-shared-interactive-labs-vector,KNOWLEDGE_BASE_ID=shell-scripts-knowledge-base}"

          if aws lambda get-function --function-name document_indexer --region $REGION &>/dev/null; then
            echo "Updating document_indexer image..."
            aws lambda update-function-code \
              --function-name document_indexer \
              --image-uri "$IMAGE" \
              --region $REGION
            aws lambda wait function-updated \
              --function-name document_indexer \
              --region $REGION
            aws lambda update-function-configuration \
              --function-name document_indexer \
              --timeout 300 \
              --memory-size 512 \
              --environment "$ENV_VARS" \
              --region $REGION
          else
            echo "Creating document_indexer Lambda..."
            aws lambda create-function \
              --function-name document_indexer \
              --package-type Image \
              --code ImageUri="$IMAGE" \
              --role "$ROLE" \
              --timeout 300 \
              --memory-size 512 \
              --environment "$ENV_VARS" \
              --region $REGION
            aws lambda wait function-active \
              --function-name document_indexer \
              --region $REGION
          fi
          echo "document_indexer is live."

      # ── ai_chatbot ────────────────────────────────────────────────────────
      - name: Build & push ai_chatbot image
        env:
          REGISTRY: ${{ steps.login.outputs.registry }}
          ECR_REPOSITORY: rosettacloud-ai_chatbot-lambda
        run: |
          IMAGE_URI=$REGISTRY/$ECR_REPOSITORY:${{ inputs.image_tag }}
          docker build --platform linux/amd64 \
            -f Backend/serverless/Lambda/ai_chatbot/Dockerfile \
            Backend/serverless/Lambda/ai_chatbot \
            -t "$IMAGE_URI"
          docker push "$IMAGE_URI"
          echo "ai_chatbot_image=$IMAGE_URI" >> $GITHUB_ENV
          echo "Pushed $IMAGE_URI"

      - name: Create or update ai_chatbot Lambda
        run: |
          ROLE="arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/rosettacloud-ai-chatbot-role"
          IMAGE="${{ env.ai_chatbot_image }}"
          REGION="${{ inputs.aws_region }}"
          ENV_VARS="Variables={LANCEDB_S3_URI=s3://rosettacloud-shared-interactive-labs-vector,KNOWLEDGE_BASE_ID=shell-scripts-knowledge-base,DYNAMO_TABLE=SessionTable}"

          if aws lambda get-function --function-name ai_chatbot --region $REGION &>/dev/null; then
            echo "Updating ai_chatbot image..."
            aws lambda update-function-code \
              --function-name ai_chatbot \
              --image-uri "$IMAGE" \
              --region $REGION
            aws lambda wait function-updated \
              --function-name ai_chatbot \
              --region $REGION
            aws lambda update-function-configuration \
              --function-name ai_chatbot \
              --timeout 300 \
              --memory-size 1024 \
              --environment "$ENV_VARS" \
              --region $REGION
          else
            echo "Creating ai_chatbot Lambda..."
            aws lambda create-function \
              --function-name ai_chatbot \
              --package-type Image \
              --code ImageUri="$IMAGE" \
              --role "$ROLE" \
              --timeout 300 \
              --memory-size 1024 \
              --environment "$ENV_VARS" \
              --region $REGION
            aws lambda wait function-active \
              --function-name ai_chatbot \
              --region $REGION
          fi
          echo "ai_chatbot is live."
